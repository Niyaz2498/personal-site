<svg width="160" height="120" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Ghost N letterform -->
  <text x="80" y="98" font-family="Georgia, serif" font-size="100" font-weight="700"
        fill="#1D9E75" opacity="0.08" text-anchor="middle">N</text>

  <!-- Connecting lines: left → middle -->
  <g stroke="#1D9E75" stroke-width="1.4" opacity="0.35">
    <line x1="26" y1="42" x2="78"  y2="18"/>
    <line x1="26" y1="42" x2="80"  y2="60"/>
    <line x1="26" y1="42" x2="78"  y2="102"/>
    <line x1="26" y1="78" x2="78"  y2="18"/>
    <line x1="26" y1="78" x2="80"  y2="60"/>
    <line x1="26" y1="78" x2="78"  y2="102"/>
    <!-- Connecting lines: middle → right -->
    <line x1="82"  y1="18"  x2="134" y2="42"/>
    <line x1="80"  y1="60"  x2="134" y2="42"/>
    <line x1="80"  y1="60"  x2="134" y2="78"/>
    <line x1="82"  y1="102" x2="134" y2="78"/>
    <line x1="82"  y1="18"  x2="134" y2="78"/>
    <line x1="82"  y1="102" x2="134" y2="42"/>
  </g>

  <!-- Left layer nodes -->
  <circle cx="26" cy="42" r="8" fill="#1D9E75"/>
  <circle cx="26" cy="78" r="8" fill="#1D9E75"/>

  <!-- Middle layer nodes -->
  <circle cx="80" cy="18"  r="8" fill="#1D9E75"/>
  <circle cx="80" cy="60"  r="8" fill="#1D9E75"/>
  <circle cx="80" cy="102" r="8" fill="#1D9E75"/>

  <!-- Right layer nodes -->
  <circle cx="134" cy="42" r="8" fill="#1D9E75"/>
  <circle cx="134" cy="78" r="8" fill="#1D9E75"/>

</svg>
